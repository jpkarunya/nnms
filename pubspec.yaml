name: netguard
description: NetGuard — AI-Based Network Threat Detection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^1.1.1

  # UI & Fonts
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.20.2

  # File picking
  file_picker: ^8.1.2
  path_provider: ^2.1.2

  # Push Notifications
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0F1E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

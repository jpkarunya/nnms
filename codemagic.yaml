workflows:
  android-apk:
    name: NetGuard APK
    max_build_duration: 60
    environment:
      flutter: 3.41.4
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Generate app icons
        script: dart run flutter_launcher_icons
      - name: Build APK
        script: |
          flutter build apk --debug
          echo "APK location:"
          find . -name "*.apk" -type f
    artifacts:
      - "**/*.apk"
